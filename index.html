<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Staff Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --white: #ffffff; --ink: #1a1a1a; --muted: #888;
  --border: #e0ddd8; --green: #1a9e6e; --green-bg: #edf7f3;
  --red: #d94040; --red-bg: #fdf0f0;
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12); --radius: 18px;
  --font: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
}
body { font-family: var(--font); background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }

.header { width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo { width: 44px; height: 44px; background: var(--ink); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
.header-title { font-size: 1.15rem; font-weight: 700; }
.header-sub { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
.header-clock { text-align: right; }
.clock-time { font-family: var(--mono); font-size: 1.3rem; font-weight: 600; letter-spacing: 2px; }
.clock-date { font-size: 0.75rem; color: var(--muted); margin-top: 2px; text-transform: capitalize; }

.card { width: 100%; max-width: 480px; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 28px 24px; margin-bottom: 16px; }
.step { display: none; }
.step.active { display: block; }
.step-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }

.emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
.emp-btn { background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 12px; cursor: pointer; text-align: center; transition: all 0.15s; position: relative; }
.emp-btn:hover { border-color: var(--ink); background: white; transform: translateY(-1px); }
.emp-avatar { width: 48px; height: 48px; background: var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: white; margin: 0 auto 10px; }
.emp-name { font-size: 0.85rem; font-weight: 600; }
.emp-status { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
.emp-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.emp-dot.active { background: var(--green); }

.pin-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.pin-avatar { width: 52px; height: 52px; background: var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700; color: white; flex-shrink: 0; }
.pin-name { font-size: 1.1rem; font-weight: 700; }
.pin-subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.15s; }
.pin-dot.filled { background: var(--ink); border-color: var(--ink); }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pin-btn { padding: 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; font-family: var(--font); font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: all 0.1s; }
.pin-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
.pin-btn.del { font-size: 0.9rem; color: var(--muted); }

.form-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 11px 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 11px; color: var(--ink); font-family: var(--mono); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
.form-input:focus { border-color: var(--ink); background: white; }
.form-row { margin-bottom: 16px; }

.fichaje-emp { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px solid var(--border); }
.fichaje-avatar { width: 42px; height: 42px; background: var(--ink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: white; flex-shrink: 0; }
.fichaje-nombre { font-size: 1rem; font-weight: 700; }
.fichaje-sub { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

.tramo { background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
.tramo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.tramo-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.tramo-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 0.8rem; font-weight: 600; padding: 2px 6px; }
.tramo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-add-tramo { width: 100%; padding: 11px; background: none; border: 1.5px dashed var(--border); border-radius: 12px; color: var(--muted); font-family: var(--font); font-size: 0.88rem; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
.btn-add-tramo:hover { border-color: var(--ink); color: var(--ink); }

.btn-submit { width: 100%; padding: 15px; background: var(--ink); border: none; border-radius: 14px; color: white; font-family: var(--font); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-submit:hover { background: #333; }
.btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-back { width: 100%; padding: 11px; background: none; border: 1.5px solid var(--border); border-radius: 12px; color: var(--muted); font-family: var(--font); font-size: 0.88rem; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
.btn-back:hover { border-color: var(--ink); color: var(--ink); }

.error-msg { display: none; background: var(--red-bg); color: var(--red); border-radius: 10px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 12px; }
.error-msg.visible { display: block; }

.confirm-wrap { text-align: center; padding: 12px 0; }
.confirm-icon { font-size: 3.5rem; margin-bottom: 14px; }
.confirm-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
.confirm-msg { font-size: 0.95rem; color: var(--muted); margin-bottom: 6px; }
.confirm-hours { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-bottom: 10px; }
.confirm-tramos { font-size: 0.82rem; color: var(--muted); font-family: var(--mono); margin-bottom: 16px; line-height: 1.8; }
.btn-nuevo { width: 100%; padding: 14px; background: var(--ink); border: none; border-radius: 14px; color: white; font-family: var(--font); font-size: 1rem; font-weight: 700; cursor: pointer; }

.loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 32px 0; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.85rem; color: var(--muted); }

.status-bar { width: 100%; max-width: 480px; background: var(--green-bg); border: 1.5px solid #b8e8d4; border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; }
.status-bar-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 10px; }
.active-item { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 3px 0; }
.active-time { font-family: var(--mono); font-size: 0.8rem; color: var(--green); }

.url-config { width: 100%; max-width: 480px; font-size: 0.8rem; color: var(--muted); }
.url-config summary { cursor: pointer; padding: 8px 0; user-select: none; }
.url-config input { width: 100%; padding: 10px 12px; margin-top: 8px; background: white; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--mono); font-size: 0.8rem; color: var(--ink); outline: none; }
.btn-save-url { margin-top: 8px; padding: 8px 16px; background: var(--ink); color: white; border: none; border-radius: 8px; font-family: var(--font); font-size: 0.82rem; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <img src="logo.png" id="header-logo-img" style="height:44px;width:auto;display:none" alt="Logo">
    <div class="header-logo" id="header-logo-icon">&#9203;</div>
    <div>
      <div class="header-title" id="empresa-nombre">Staff Clock</div>
      <div class="header-sub">Control de jornada</div>
    </div>
  </div>
  <div class="header-clock">
    <div class="clock-time" id="clock-time">--:--:--</div>
    <div class="clock-date" id="clock-date"></div>
  </div>
</div>

<div class="card">

  <div id="step-loading" class="step active">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Conectando...</div>
    </div>
  </div>

  <div id="step-1" class="step">
    <div class="step-label">Quien eres?</div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>

  <div id="step-2" class="step">
    <div class="pin-header">
      <div class="pin-avatar" id="pin-avatar">?</div>
      <div>
        <div class="pin-name" id="pin-name">Empleado</div>
        <div class="pin-subtitle">Introduce tu PIN de 4 digitos</div>
      </div>
    </div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="error-msg" id="pin-error">PIN incorrecto. Intentalo de nuevo.</div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn del" onclick="pinBack()">&#9003;</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="goStep(1)">X</button>
    </div>
  </div>

  <div id="step-3" class="step">
    <div class="fichaje-emp">
      <div class="fichaje-avatar" id="fichaje-avatar">?</div>
      <div>
        <div class="fichaje-nombre" id="fichaje-nombre">Empleado</div>
        <div class="fichaje-sub">Registra tu jornada</div>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Fecha</label>
      <input type="date" class="form-input" id="fichaje-fecha" onchange="onFechaChange()">
    </div>
    <div id="tramos-container"></div>
    <button class="btn-add-tramo" id="btn-add-tramo" onclick="addTramo()">+ Anadir tramo</button>
    <div class="error-msg" id="fichaje-error"></div>
    <button class="btn-submit" id="btn-submit" onclick="enviarFichaje()">Registrar jornada</button>
    <button class="btn-back" onclick="goStep(1)">Cambiar empleado</button>
  </div>

  <div id="step-4" class="step">
    <div class="confirm-wrap">
      <div class="confirm-icon">&#9989;</div>
      <div class="confirm-title" id="confirm-title">Registrado!</div>
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-hours" id="confirm-hours"></div>
      <div class="confirm-tramos" id="confirm-tramos"></div>
      <button class="btn-nuevo" onclick="goStep(1)">Nuevo fichaje</button>
    </div>
  </div>

</div>

<div class="status-bar" id="status-bar" style="display:none">
  <div class="status-bar-title">Registros de hoy</div>
  <div id="active-list"></div>
</div>

<div class="url-config">
  <details id="config-details">
    <summary>Configuracion del servidor</summary>
    <input type="url" id="script-url" placeholder="https://script.google.com/macros/s/.../exec">
    <br>
    <button class="btn-save-url" onclick="saveUrl()">Guardar y conectar</button>
  </details>
</div>

<script>
// Auto-formato HH:MM en inputs de hora
document.addEventListener('input', function(e) {
  if (!e.target.matches('input[placeholder="09:00"], input[placeholder="14:00"]')) return;
  var v = e.target.value.replace(/[^0-9]/g, '');
  if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);
  e.target.value = v;
});

let SCRIPT_URL  = localStorage.getItem('staffclock_url') || '';
let empleados   = [];
let selectedEmp = null;
let pinValue    = '';
let tramoCount  = 0;
let geoData     = { lat:'', lng:'', direccion:'' };

function captureGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos) {
    geoData.lat = pos.coords.latitude.toFixed(6);
    geoData.lng = pos.coords.longitude.toFixed(6);
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+geoData.lat+'&lon='+geoData.lng+'&format=json')
      .then(r=>r.json()).then(d=>{ geoData.direccion = d.display_name ? d.display_name.slice(0,80):''; }).catch(()=>{});
  }, function(){}, {timeout:8000, maximumAge:60000});
}

function updateClock() {
  const n = new Date();
  document.getElementById('clock-time').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock-date').textContent =
    n.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
}
setInterval(updateClock, 1000);
updateClock();

async function api(params) {
  if (!SCRIPT_URL) throw new Error('Sin URL');
  const url = SCRIPT_URL+'?'+Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const res = await fetch(url);
  return await res.json();
}

function goStep(n) {
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step-'+n).classList.add('active');
  if (n===3) initFichajeForm();
}

function initiales(nombre) {
  return nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
}

async function init() {
  if (!SCRIPT_URL) { document.getElementById('config-details').open=true; goStep(1); return; }
  try {
    const [cfg, emp] = await Promise.all([api({action:'getConfig'}), api({action:'getEmpleados'})]);
    if (cfg.ok && cfg.config.empresa) {
      document.getElementById('empresa-nombre').textContent = cfg.config.empresa;
      // Mostrar logo si existe
      var logoImg = document.getElementById('header-logo-img');
      var logoIcon = document.getElementById('header-logo-icon');
      logoImg.onload = function() { logoImg.style.display='block'; logoIcon.style.display='none'; };
      logoImg.onerror = function() { logoImg.style.display='none'; logoIcon.style.display='block'; };
      logoImg.src = 'logo.png';
    }
    if (emp.ok) { empleados = emp.empleados; renderEmpleados(); }
    goStep(1);
    loadStatusBar();
  } catch(e) { goStep(1); }
}

function renderEmpleados() {
  const grid = document.getElementById('emp-grid');
  grid.innerHTML = '';
  empleados.forEach(emp => {
    const btn = document.createElement('button');
    btn.className = 'emp-btn';
    btn.innerHTML = `<div class="emp-avatar">${initiales(emp.nombre)}</div>
      <div class="emp-name">${emp.nombre.split(' ')[0]}</div>
      <div class="emp-status" id="status-${emp.id}">Libre</div>
      <div class="emp-dot" id="dot-${emp.id}"></div>`;
    btn.onclick = () => selectEmp(emp);
    grid.appendChild(btn);
  });
}

async function loadStatusBar() {
  try {
    const res = await api({action:'getStatus'});
    if (!res.ok || !res.activos) return;
    res.activos.forEach(a => {
      const s = document.getElementById('status-'+a.empleado_id);
      const d = document.getElementById('dot-'+a.empleado_id);
      if (s) { s.textContent = 'Hoy: '+a.horas; s.style.color='var(--green)'; }
      if (d) d.className = 'emp-dot active';
    });
    if (res.activos.length > 0) {
      document.getElementById('active-list').innerHTML = res.activos.map(a=>
        `<div class="active-item"><span>${a.nombre}</span><span class="active-time">${a.horas}</span></div>`
      ).join('');
      document.getElementById('status-bar').style.display = 'block';
    }
  } catch(e) {}
}

function selectEmp(emp) {
  selectedEmp = emp;
  pinValue = '';
  document.getElementById('pin-avatar').textContent = initiales(emp.nombre);
  document.getElementById('pin-name').textContent = emp.nombre;
  document.getElementById('pin-error').classList.remove('visible');
  updatePinDots();
  goStep(2);
}

function updatePinDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled', i<pinValue.length));
}
function pinPress(d) {
  if (pinValue.length >= 4) return;
  pinValue += d;
  updatePinDots();
  if (pinValue.length === 4) checkPin();
}
function pinBack() {
  pinValue = pinValue.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').classList.remove('visible');
}
function checkPin() {
  if (pinValue === selectedEmp.pin) {
    document.getElementById('pin-error').classList.remove('visible');
    goStep(3);
  } else {
    document.getElementById('pin-error').classList.add('visible');
    pinValue = '';
    updatePinDots();
  }
}

function todayStr() {
  const n = new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}

async function initFichajeForm() {
  document.getElementById('fichaje-avatar').textContent = initiales(selectedEmp.nombre);
  document.getElementById('fichaje-nombre').textContent = selectedEmp.nombre;
  document.getElementById('fichaje-fecha').value = todayStr();
  document.getElementById('tramos-container').innerHTML = '';
  tramoCount = 0;
  document.getElementById('fichaje-error').classList.remove('visible');
  document.getElementById('btn-add-tramo').style.display = '';
  document.getElementById('btn-submit').disabled = false;
  document.getElementById('btn-submit').textContent = 'Registrar jornada';

  // Cargar tramos existentes si ya hay registro hoy
  try {
    const res = await api({action:'getRegistroDia', emp_id:selectedEmp.id, fecha:todayStr()});
    if (res.ok && res.existe && res.tramos && res.tramos.length > 0) {
      res.tramos.forEach(t => {
        addTramo();
        const n = tramoCount;
        const eEl = document.getElementById('ent-'+n);
        const sEl = document.getElementById('sal-'+n);
        if (eEl) eEl.value = t.entrada.slice(0,5);
        if (sEl) sEl.value = t.salida.slice(0,5);
      });
      document.getElementById('fichaje-sub') && (document.getElementById('fichaje-sub').textContent = 'Jornada de hoy: ' + res.total + ' - puedes anadir mas tramos');
      document.getElementById('btn-submit').textContent = 'Actualizar jornada';
    } else {
      addTramo();
    }
  } catch(e) {
    addTramo();
  }
}

async function onFechaChange() {
  const fecha = document.getElementById('fichaje-fecha').value;
  if (!fecha || !selectedEmp) return;
  document.getElementById('tramos-container').innerHTML = '';
  tramoCount = 0;
  document.getElementById('btn-add-tramo').style.display = '';
  try {
    const res = await api({action:'getRegistroDia', emp_id:selectedEmp.id, fecha:fecha});
    if (res.ok && res.existe && res.tramos && res.tramos.length > 0) {
      res.tramos.forEach(t => {
        addTramo();
        const n = tramoCount;
        const eEl = document.getElementById('ent-'+n);
        const sEl = document.getElementById('sal-'+n);
        if (eEl) eEl.value = t.entrada.slice(0,5);
        if (sEl) sEl.value = t.salida.slice(0,5);
      });
      document.getElementById('btn-submit').textContent = 'Actualizar jornada';
    } else {
      addTramo();
      document.getElementById('btn-submit').textContent = 'Registrar jornada';
    }
  } catch(e) { addTramo(); }
}

function addTramo() {
  if (tramoCount >= 3) return;
  tramoCount++;
  const n = tramoCount;
  const div = document.createElement('div');
  div.className = 'tramo';
  div.id = 'tramo-wrap-'+n;
  div.innerHTML = `
    <div class="tramo-header">
      <div class="tramo-label">Tramo ${n}</div>
      ${n > 1 ? `<button class="tramo-remove" onclick="removeTramo(${n})">Eliminar</button>` : ''}
    </div>
    <div class="tramo-grid">
      <div>
        <label class="form-label">Entrada</label>
        <input type="text" class="form-input" id="ent-${n}" placeholder="09:00" maxlength="5" pattern="[0-9]{2}:[0-9]{2}">
      </div>
      <div>
        <label class="form-label">Salida</label>
        <input type="text" class="form-input" id="sal-${n}" placeholder="14:00" maxlength="5" pattern="[0-9]{2}:[0-9]{2}">
      </div>
    </div>`;
  document.getElementById('tramos-container').appendChild(div);
  if (tramoCount >= 3) document.getElementById('btn-add-tramo').style.display = 'none';
}

function removeTramo(n) {
  const el = document.getElementById('tramo-wrap-'+n);
  if (el) el.remove();
  tramoCount--;
  document.getElementById('btn-add-tramo').style.display = '';
  document.querySelectorAll('.tramo-label').forEach((l,i)=>{ l.textContent='Tramo '+(i+1); });
}

async function enviarFichaje() {
  const errEl = document.getElementById('fichaje-error');
  errEl.classList.remove('visible');
  const fecha = document.getElementById('fichaje-fecha').value;
  if (!fecha) { errEl.textContent='Selecciona una fecha.'; errEl.classList.add('visible'); return; }

  // Recoger todos los tramos del DOM en orden de aparicion
  const tramos = [];
  document.querySelectorAll('.tramo').forEach((wrap, idx) => {
    const eEl = wrap.querySelector('input[id^="ent-"]');
    const sEl = wrap.querySelector('input[id^="sal-"]');
    if (!eEl || !sEl || !eEl.value || !sEl.value) return;
    // Validar formato HH:MM
    const timeRe = /^([01]?[0-9]|2[0-3]):[0-5][0-9]$/;
    if (!timeRe.test(eEl.value)) { errEl.textContent = 'Formato de hora invalido: ' + eEl.value + ' (usa HH:MM)'; errEl.classList.add('visible'); return; }
    if (!timeRe.test(sEl.value)) { errEl.textContent = 'Formato de hora invalido: ' + sEl.value + ' (usa HH:MM)'; errEl.classList.add('visible'); return; }
    tramos.push({entrada: eEl.value+':00', salida: sEl.value+':00'});
  });
  // Ordenar por hora de entrada
  tramos.sort((a,b) => a.entrada < b.entrada ? -1 : 1);

  if (tramos.length === 0) {
    errEl.textContent = 'Introduce al menos un tramo con entrada y salida.';
    errEl.classList.add('visible'); return;
  }
  for (let i=0; i<tramos.length; i++) {
    if (tramos[i].entrada >= tramos[i].salida) {
      errEl.textContent = 'Tramo '+(i+1)+': la salida debe ser posterior a la entrada.';
      errEl.classList.add('visible'); return;
    }
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Registrando...';

  try {
    const res = await api({
      action: 'fichajeCompleto',
      emp_id: selectedEmp.id,
      pin:    selectedEmp.pin,
      fecha,
      tramos: JSON.stringify(tramos),
      lat:    geoData.lat,
      lng:    geoData.lng,
      dispositivo: navigator.userAgent.includes('Mobile') ? 'movil' : 'escritorio'
    });

    if (!res.ok) {
      errEl.textContent = res.error;
      errEl.classList.add('visible');
      btn.disabled = false; btn.textContent = 'Registrar jornada';
      return;
    }

    document.getElementById('confirm-title').textContent = fecha === todayStr() ? 'Jornada registrada!' : 'Fichaje registrado!';
    document.getElementById('confirm-msg').textContent = selectedEmp.nombre + ' - ' + fecha;
    document.getElementById('confirm-hours').textContent = 'Total: ' + res.total_horas;
    document.getElementById('confirm-tramos').innerHTML = (res.tramos_resumen||[]).join('<br>');
    goStep(4);
    btn.disabled = false; btn.textContent = 'Registrar jornada';
    loadStatusBar();
  } catch(e) {
    errEl.textContent = 'Error de conexion.';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Registrar jornada';
  }
}

function saveUrl() {
  const val = document.getElementById('script-url').value.trim();
  if (!val) return;
  SCRIPT_URL = val;
  localStorage.setItem('staffclock_url', val);
  document.getElementById('config-details').open = false;
  init();
}

captureGeo();
if (SCRIPT_URL) { document.getElementById('script-url').value = SCRIPT_URL; init(); }
else { document.getElementById('config-details').open = true; goStep(1); }
</script>
